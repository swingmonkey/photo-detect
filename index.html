<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目导航 - Project Portal</title>
    <link rel="stylesheet" href="portal/index.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>项目导航</h1>
            <p class="subtitle">选择一个项目开始使用</p>
        </header>

        <main class="main-content">
            <!-- 项目卡片 -->
            <section class="features">
                <div class="feature-grid" style="max-width: 600px; margin: 0 auto;">
                    <a href="photo-detect/index.html" class="feature-card" style="text-decoration: none; color: inherit;">
                        <div class="feature-icon">📸</div>
                        <h3>Photo Detect</h3>
                        <p>照片信息提取工具 - 提取EXIF元数据、地理位置、拍摄时间等信息</p>
                        <div style="margin-top: 20px;">
                            <span class="start-btn" style="display: inline-block; padding: 12px 24px; font-size: 16px;">
                                进入工具 →
                            </span>
                        </div>
                    </a>
                </div>
            </section>

            <!-- 关于 -->
            <section class="quick-start" style="margin-top: 40px;">
                <h2 style="color: var(--text); margin-bottom: 20px;">关于</h2>
                <p style="color: var(--text-secondary);">
                    这是一个基于 Web 的照片元数据提取工具，所有处理都在本地完成，保护您的隐私。
                </p>
                <div class="footer-links" style="margin-top: 20px;">
                    <a href="https://github.com/swingmonkey/photo-detect" target="_blank">GitHub 仓库</a>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Photo Detect. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
